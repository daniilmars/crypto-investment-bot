# ----------------------------------------------------
# API Keys and Configuration for the Crypto Bot
# ----------------------------------------------------
#
# INSTRUCTIONS:
# 1. Rename this file from 'settings.yaml.example' to 'settings.yaml'.
# 2. Fill in your actual API keys and settings below.
# 3. IMPORTANT: The 'settings.yaml' file is listed in .gitignore and will NOT be committed.
#
# ----------------------------------------------------

# -- GCP Billing Settings --
# Configuration for the /gcosts command.
gcp_billing:
  enabled: true
  # Find this in your GCP Console under 'Billing' -> 'Account Management'.
  # It typically looks like '012345-ABCDEF-GHIJKL'.
  billing_account_id: "YOUR_GCP_BILLING_ACCOUNT_ID"

# -- Notification Settings --
# Choose your preferred notification service.
# You can enable multiple services.

notification_services:
  telegram:
    enabled: true
    token: "8323515226:AAEEo7_lbvk870cj2eZKWkcPQDM47DBbwVw"
    chat_id: "7910661624"
    authorized_user_ids:
      - 7910661624

  pushover:
    enabled: false
    user_key: "YOUR_PUSHOVER_USER_KEY"
    api_token: "YOUR_PUSHOVER_API_TOKEN"

# -- API Keys for Data Sources --
# Add the API keys for the data sources you want to use.

api_keys:
  binance:
    api_key: "YOUR_BINANCE_API_KEY"
    api_secret: "YOUR_BINANCE_API_SECRET"
  gemini: "YOUR_GEMINI_API_KEY"
  alpha_vantage: "YOUR_ALPHA_VANTAGE_API_KEY"
  lunarcrush: "YOUR_LUNARCRUSH_API_KEY"
  glassnode: "YOUR_GLASSNODE_API_KEY"
  news_api: "YOUR_NEWS_API_KEY"
  alpaca:
    api_key: "YOUR_ALPACA_API_KEY"
    api_secret: "YOUR_ALPACA_API_SECRET"

# -- General Bot Settings --
settings:
  # Crypto and stock watch lists are loaded from config/watch_list.yaml.
  # Override with env vars WATCH_LIST / STOCK_WATCH_LIST if needed.

  # How often the bot should run its analysis cycle, in minutes.
  run_interval_minutes: 15

  # -- Technical Indicator Settings --
  # Period for Simple Moving Average (SMA) calculation.
  sma_period: 20
  # RSI overbought threshold (e.g., 70 for overbought).
  rsi_overbought_threshold: 70
  # RSI oversold threshold (e.g., 30 for oversold).
  rsi_oversold_threshold: 30

  # -- Signal Mode --
  # "sentiment" = Gemini-first with technical filters (recommended)
  # "scoring"   = legacy 8-indicator scoring system
  signal_mode: "sentiment"

  # -- Sentiment Signal Settings (used when signal_mode = "sentiment") --
  sentiment_signal:
    min_gemini_confidence: 0.5
    min_vader_score: 0.3
    rsi_buy_veto_threshold: 70
    rsi_sell_veto_threshold: 30
    adx_min_threshold: 20

  # Per-symbol cooldown (hours) after a stop-loss exit before re-entering.
  stoploss_cooldown_hours: 24

  # Per-symbol cooldown (hours) to suppress repeat BUY/SELL for the same symbol.
  signal_cooldown_hours: 4

  # -- Telegram Bot Settings --
  # The number of hours to look back for the /status report.
  status_report_hours: 24

  # -- Trading Settings --
  # Enable or disable paper trading mode. If true, no real trades will be placed.
  paper_trading: true
  # Initial capital for paper trading simulation.
  paper_trading_initial_capital: 10000.0

  # -- Paper Trading Fee Simulation --
  # Simulated trading fee (0.1% = Binance spot default) deducted from paper SELL PnL.
  simulated_fee_pct: 0.001

  # -- Paper Trading Slippage Simulation --
  # Simulated slippage (0.1% default) applied to paper fill prices.
  # BUY fills higher, SELL fills lower — models real-world market impact.
  simulated_slippage_pct: 0.001

  # -- Risk Management Settings --
  # Optimized via SL/TP sweep on 23-day dataset (Jan 12 – Feb 5, 2026).
  # SL=3.5%/TP=8%: +30.6% return, 55.7% win rate, Sharpe 2.15.
  trade_risk_percentage: 0.05
  stop_loss_percentage: 0.10
  take_profit_percentage: 0.50
  min_trade_notional: 5.00
  max_concurrent_positions: 5

  # -- Daily SMA Trend Filter --
  # Use daily klines (not 15-min snapshots) for SMA trend filter on crypto.
  trend_filter:
    use_daily_klines: true
    daily_sma_period: 20
    kline_cache_minutes: 60

  # -- ATR-Based Dynamic SL/TP --
  # Per-symbol SL/TP computed from ATR. Falls back to fixed values when disabled.
  dynamic_risk:
    enabled: true
    atr_period: 14
    sl_atr_multiplier: 2.0   # SL = ATR% × 2.0
    tp_atr_multiplier: 5.0   # TP = ATR% × 5.0
    sl_floor: 0.07           # min 7%
    sl_ceiling: 0.15         # max 15%
    tp_floor: 0.10           # min 10%
    tp_ceiling: 0.50         # max 50%

  # -- Limit Orders with Pullback Entry --
  # For normal-confidence signals, place a limit buy below current price.
  limit_orders:
    enabled: true
    pullback_pct: 0.005           # 0.5% below current price
    ttl_cycles: 8                 # expire after 8 cycles (2h at 15-min intervals)
    market_order_threshold: 0.8   # high-confidence → market order
    max_pending_orders: 3

  # -- Trailing Stop Settings --
  trailing_stop_enabled: true
  trailing_stop_activation: 0.05    # activate after 5% gain
  trailing_stop_distance: 0.02      # trail 2% from peak

  # -- Regular Status Update Settings --
  regular_status_update:
    enabled: true
    interval_hours: 1

  # -- News Analysis Settings --
  news_analysis:
    enabled: true
    # Use Google Search grounding (disabled — flash token costs too high at CHF 1.50/day).
    # RSS+scraping always runs; falls back to analyze_news_impact (Vertex AI flash-lite).
    use_grounded_search: false
    # Web scraping supplements RSS feeds with direct page content
    web_scraping:
      enabled: true
    # Deep scraping: fetch full article body for important categories (regulatory/kol/ipo)
    deep_scraping:
      enabled: true
    # Use Gemini 2.0 Flash for per-article sentiment scoring (replaces VADER, DB-cached)
    use_gemini_scoring: true
    # Cache Gemini grounded search per batch (90 min = every 6th cycle)
    # 10 batches × ~8 uncached cycles/day = ~80 calls/day (within 500 free RPD)
    cache_ttl_minutes: 90
    # Freshness decay half-life: articles older than this (hours) get half weight
    freshness_half_life_hours: 6
    # Volume spike: trigger Gemini if current_volume > previous_volume * multiplier
    volume_spike_multiplier: 3.0
    # Sentiment shift: trigger Gemini if abs(current - previous) >= threshold
    sentiment_shift_threshold: 0.3
    # VADER sentiment thresholds for signal scoring
    sentiment_buy_threshold: 0.15
    sentiment_sell_threshold: -0.15
    # Minimum Gemini confidence to override VADER
    min_gemini_confidence: 0.5

  # -- Live Trading Settings --
  live_trading:
    enabled: false          # Master switch (must also set paper_trading: false)
    mode: "testnet"         # "testnet" or "live"
    initial_capital: 100.0
    max_concurrent_positions: 2
    trade_risk_percentage: 0.05
    stop_loss_percentage: 0.10
    take_profit_percentage: 0.50
    # Circuit breaker thresholds (widened for catastrophic SL regime)
    daily_loss_limit_pct: 0.15
    max_drawdown_pct: 0.25
    balance_floor_usd: 50.0
    max_consecutive_losses: 5
    cooldown_hours: 6

  # -- Stock Trading Settings --
  # Stock watch list is loaded from config/watch_list.yaml (US + EU + Asia).
  stock_trading:
    enabled: true
    broker: "paper_only"    # "paper_only" or "alpaca"
    alpaca:
      paper: true           # use Alpaca paper trading endpoint
    # Separate capital pool for stocks (independent from crypto's $10k)
    paper_trading_initial_capital: 10000.0
    max_concurrent_positions: 8
    sma_period: 20
    rsi_period: 14
    rsi_overbought_threshold: 70
    rsi_oversold_threshold: 30
    pe_ratio_buy_threshold: 25
    pe_ratio_sell_threshold: 40
    earnings_growth_sell_threshold: -10
    volume_spike_multiplier: 1.5

  # -- Signal Confirmation Settings --
  # Require manual Telegram approval before executing BUY/SELL trades.
  # Protective exits (SL/TP/trailing) are NEVER gated by confirmation.
  signal_confirmation:
    enabled: true
    timeout_minutes: 30
    require_confirmation_for:
      - "BUY"
      - "SELL"
      - "INCREASE"

  # -- News Scraper Daemon Settings --
  # Continuous scraper with tiered intervals (replaces launchd batch approach)
  news_scraper_daemon:
    rss_interval_seconds: 300        # 5 minutes
    web_interval_seconds: 900        # 15 minutes
    deep_interval_seconds: 1800      # 30 minutes
    dedup_cache_hours: 48
    chrome_mcp:
      enabled: true
      timeout_seconds: 180
      fallback_to_bs4: true

  # -- Position Analyst Settings --
  # Tri-state investment analyst: HOLD / INCREASE / SELL
  # Replaces position_monitor when enabled.
  position_analyst:
    enabled: true
    min_position_age_hours: 2
    quick_check_interval_minutes: 240  # Flash analyst every 4h (exit-only)
    check_interval_minutes: 1440  # Pro analyst once per day
    exit_confidence_threshold: 0.8
    increase_confidence_threshold: 0.75
    max_position_multiplier: 3.0

  # -- Strategic Investment Categories --
  # Long-term positions with thesis-driven exits instead of fixed SL/TP.
  # Each category uses only a catastrophic stop-loss (no TP, no trailing stop).
  # The position analyst evaluates against the original investment thesis.
  strategic_categories:
    growth:
      label: "Growth (AI, Quantum, Biotech)"
      catastrophic_sl: 0.25
    sector_thesis:
      label: "Sector Rotation Bet"
      catastrophic_sl: 0.20
    value:
      label: "Undervalued Recovery Play"
      catastrophic_sl: 0.15
    macro_trend:
      label: "Macro Trend Following"
      catastrophic_sl: 0.20
    speculative:
      label: "Speculative Moonshot"
      catastrophic_sl: 0.30

  # -- Auto-Trading Shadow Bot (legacy, used as fallback if strategies: absent) --
  auto_trading:
    enabled: true
    paper_trading_initial_capital: 10000.0
    max_concurrent_positions: 20
    summary_interval_hours: 1
    min_signal_strength: 0.65
    min_sell_signal_strength: 0.50
    caution_strength_boost: 0.10

  # -- Parallel Trading Strategies --
  # Each strategy runs independently with its own capital pool, risk params,
  # signal weights, and circuit breaker thresholds. All share the same Gemini
  # news pipeline (no extra API cost). Manual strategy is separate (Telegram flow).
  strategies:
    auto:
      enabled: true
      paper_trading_initial_capital: 10000.0
      max_concurrent_positions: 20
      summary_interval_hours: 1
      min_signal_strength: 0.65
      min_sell_signal_strength: 0.50
      regime_behavior:
        ignore_risk_off: false
        caution_strength_boost: 0.10
        allow_transition_trading: true
        transition_min_signal_strength: 0.80
      risk_params:
        stop_loss_percentage: 0.10
        take_profit_percentage: 0.50
        trailing_stop_enabled: true
        trailing_stop_activation: 0.05
        trailing_stop_distance: 0.02
      weights:
        base_confidence: 1.0
        hype_multiplier: 1.0
        fundamental_multiplier: 1.0
        catalyst_count_bonus: 0.0
        risk_factor_penalty: 0.05
        breaking_boost: 0.0
        min_catalyst_count: 0
        sma50_penalty: 0.15
        sma200_penalty: 0.25

    momentum:
      enabled: true
      paper_trading_initial_capital: 5000.0
      max_concurrent_positions: 10
      min_signal_strength: 0.55
      min_sell_signal_strength: 0.45
      regime_behavior:
        ignore_risk_off: true
        caution_strength_boost: 0.00
      risk_params:
        stop_loss_percentage: 0.05
        take_profit_percentage: 0.15
        trailing_stop_enabled: true
        trailing_stop_activation: 0.03
        trailing_stop_distance: 0.015
      weights:
        base_confidence: 1.0
        hype_multiplier: 1.0
        fundamental_multiplier: 0.7
        catalyst_count_bonus: 0.0
        risk_factor_penalty: 0.0
        breaking_boost: 0.15
        min_catalyst_count: 0
        sma50_penalty: 0.10
        sma200_penalty: 0.15

    conservative:
      enabled: true
      paper_trading_initial_capital: 15000.0
      max_concurrent_positions: 5
      min_signal_strength: 0.80
      min_sell_signal_strength: 0.65
      regime_behavior:
        ignore_risk_off: false
        caution_strength_boost: 0.15
      risk_params:
        stop_loss_percentage: 0.07
        take_profit_percentage: 0.50
        trailing_stop_enabled: true
        trailing_stop_activation: 0.03
        trailing_stop_distance: 0.015
      weights:
        base_confidence: 0.8
        hype_multiplier: 0.6
        fundamental_multiplier: 1.3
        catalyst_count_bonus: 0.10
        risk_factor_penalty: 0.10
        breaking_boost: 0.0
        min_catalyst_count: 2
        sma50_penalty: 0.20
        sma200_penalty: 0.30

  # -- Position Rotation Settings --
  # When at max positions and a strong BUY signal fires, rotate out the
  # weakest position (by PnL velocity = % gain per day held).
  position_rotation:
    enabled: true
    min_hold_hours: 24              # Don't rotate positions younger than this
    min_signal_strength: 0.6        # New signal must be at least this strong
    min_strength_advantage: 0.15    # Signal strength must exceed weakness by this
    min_pnl_velocity_threshold: -0.005  # Only rotate positions with velocity below this
    rotation_cooldown_hours: 4      # Cooldown between rotations
    max_rotations_per_cycle: 1      # Max rotations per bot cycle

  # -- IPO Tracking Settings --
  ipo_tracking:
    enabled: true
    auto_add_to_watchlist: true
    detection_categories:
      - ipo
      - ai
      - press_release
    validate_ticker: true

  # -- Macro Regime Detection --
  # Classifies market as RISK_ON / CAUTION / RISK_OFF using VIX, S&P, yields, BTC.
  # Adjusts position sizing and can suppress BUY signals in risk-off regimes.
  macro_regime:
    enabled: true
    risk_on_multiplier: 1.0
    caution_multiplier: 0.6
    risk_off_multiplier: 0.3
    suppress_buys_in_risk_off: true
    vix_elevated_threshold: 18
    vix_high_threshold: 25
    vix_extreme_threshold: 35
    # Weighted scoring: VIX level matters most, BTC/VIX trend least
    weights:
      vix_signal: 2.0
      vix_trend: 1.0
      sp500_trend: 1.5
      yield_direction: 1.5
      btc_trend: 1.0
    risk_on_threshold: 3.0
    risk_off_threshold: -3.0
    # Tighten trailing stops for open positions during RISK_OFF regime
    risk_off_exit_acceleration:
      trailing_activation_multiplier: 0.5   # 2% → 1%
      trailing_distance_multiplier: 0.7     # 1.5% → 1.05%

    # Regime transition trading — early entries when RISK_OFF is improving
    # Detects: score trending up from trough + VIX declining from peak
    # Disabled by default — opt-in after validating with backtesting
    transition_trading:
      enabled: false
      min_score_improvement: 2.0        # score must rise this much from trough
      min_vix_decline_points: 2.0       # VIX must fall this much from peak
      vix_ceiling: 35                   # block if VIX above this (crash guard)
      min_consecutive_improving: 2      # cycles of improvement before allowing
      transition_multiplier: 0.3        # position size (half of CAUTION 0.6x)

  # -- Daily Sector Review --
  # Gemini Pro sector conviction scores, modulates signal thresholds.
  # Cost: ~$0.78/mo (1 Gemini 2.5 Pro call/day).
  sector_review:
    enabled: true
    review_hour_utc: 7
    conviction_influence_pct: 0.10     # max threshold adjustment (+-10%)
    min_articles_for_review: 3         # skip sector if fewer articles
    telegram_digest: true

  # -- Correlation-Aware Sector Limits --
  # Prevents over-concentration in correlated assets (e.g., 5 AI stocks = 1 bet).
  sector_limits:
    enabled: true
    config_file: "config/sector_groups.yaml"
    telegram_alert_on_block: false

  # -- Event Calendar --
  # Gates BUY/INCREASE signals before earnings, FOMC, CPI releases.
  # Never blocks protective exits (SL/TP/trailing).
  event_calendar:
    enabled: true
    earnings:
      enabled: true
      block_hours_before: 24
      reduce_hours_before: 48
      reduce_multiplier: 0.5
    fomc:
      enabled: true
      block_hours_before: 24
      reduce_hours_before: 48
      reduce_multiplier: 0.5
    cpi:
      enabled: true
      block_hours_before: 0
      reduce_hours_before: 24
      reduce_multiplier: 0.5
    position_warnings:
      enabled: true
      lookahead_hours: 72

  # -- Proactive Market Event Alerts --
  # Push alerts for scheduled macro events, breaking news, and sector moves.
  # Cost: $0 additional — reuses existing Gemini assessments and DB queries.
  market_alerts:
    enabled: true
    daily_digest_hour_utc: 8
    daily_digest_lookahead_hours: 72
    breaking_news:
      enabled: true
      min_confidence: 0.7
      catalyst_types: [regulatory, hack_exploit, macro, etf]
      cooldown_hours: 4
    sector_moves:
      enabled: true
      min_symbols_for_alert: 3
      min_avg_confidence: 0.5
      cooldown_hours: 6
    event_urgency:
      enabled: true
      urgency_hours_before: 24
      cooldown_hours: 12

  # -- Autonomous Bot Infrastructure --
  # Enables self-improving capabilities: source discovery, feedback loops, auto-tuning.
  autonomous_bot:
    source_discovery:
      enabled: true
      discovery_interval_days: 7
      min_trial_days: 7
      min_trial_articles: 10
      promotion_threshold: 0.6
      demotion_threshold: 0.2
      max_experimental_sources: 10

    feedback_loop:
      enabled: true
      daily_review_hour_utc: 3
      min_trades_for_scoring: 5
      reliability_decay_days: 90

    auto_tuner:
      enabled: true
      tune_interval_days: 7
      min_sample_trades: 20
      min_sharpe_improvement: 0.1
      max_param_changes_per_cycle: 2
      auto_revert_days: 7
      auto_revert_degradation_pct: 0.10
      # Safety bounds
      sl_min: 0.05
      sl_max: 0.15
      tp_min: 0.08
      tp_max: 0.50
      confidence_min: 0.35
      confidence_max: 0.75

    weekly_self_review:
      enabled: true
      review_day: 6            # 0=Mon, 6=Sun
      review_hour_utc: 4
      min_trades_for_review: 5

  # -- Telegram Enhancements --
  telegram_enhancements:
    morning_briefing:
      enabled: true
      hour_utc: 13              # 1PM UTC = 8AM EST
      include_ai_summary: false  # add Gemini section (~$0.001/day)
    portfolio_digest:
      enabled: true
      interval_hours: 4
    realtime_alerts:
      enabled: true
      vix_spike_threshold: 3.0
      regime_change_alert: true
    ai_analysis:
      enabled: true
      cooldown_minutes: 15
    quick_actions:
      enabled: true
    ai_chat:
      enabled: true
      session_ttl_minutes: 30
      rate_limit_messages: 20
      rate_limit_window_seconds: 600
      max_history_turns: 20
      watchlist:
        enabled: true
        default_ttl_days: 30
        max_items: 10

  # -- Live Dashboard Settings --
  # Replaces periodic messages with a single auto-updating pinned dashboard.
  live_dashboard:
    enabled: true
    daily_recap_hour_utc: 22

  # -- Position Monitor Settings (legacy, used when position_analyst is disabled) --
  # Sub-bot that monitors open positions and asks Gemini "hold or exit?"
  position_monitor:
    enabled: true
    min_position_age_hours: 4
    exit_confidence_threshold: 0.8
    auto_exit: false    # false = alert only, true = auto-sell
    check_interval_minutes: 60
