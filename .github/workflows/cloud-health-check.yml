name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

env:
  ZONE: europe-west3-a
  INSTANCE_NAME: crypto-bot-eu

jobs:
  health-check:
    name: Check Bot Health
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Check VM status and restart if preempted
        id: vm_status
        run: |
          STATUS=$(gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.ZONE }} \
            --format='get(status)')
          echo "VM status: $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "TERMINATED" ] || [ "$STATUS" = "STOPPED" ]; then
            echo "::warning::VM was preempted/stopped — restarting..."
            gcloud compute instances start ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }}
            echo "Waiting 150s for VM + Docker + TensorFlow startup..."
            sleep 150
          fi

      - name: Health check
        run: |
          EXTERNAL_IP=$(gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM IP: $EXTERNAL_IP"

          # The bot returns 503 for ~10s during each 15-min cycle while it
          # holds DB connections. Retry once after 30s to ride out that window.
          # Accept any response with a "status" field as proof of life;
          # only fail if both attempts return no valid JSON body.
          check() {
            curl -s --max-time 15 "http://${EXTERNAL_IP}:8080/health" 2>&1
          }
          RESPONSE=$(check)
          if ! echo "$RESPONSE" | grep -q '"status"'; then
            echo "First attempt returned no valid body — retrying in 30s"
            sleep 30
            RESPONSE=$(check)
          fi
          if echo "$RESPONSE" | grep -q '"status"'; then
            echo "Bot is alive: $RESPONSE"
          else
            echo "::error::Health check failed after retry — bot may be down (IP: $EXTERNAL_IP)"
            exit 1
          fi
