name: Deploy to GCE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ZONE: europe-west3-a
  INSTANCE_NAME: crypto-bot-eu

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: |
          flake8 src/ --count --statistics
          mypy src/execution/circuit_breaker.py src/execution/binance_trader.py src/orchestration/trade_executor.py

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to GCE VM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env file
        run: |
          cat > .env << EOF
          BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET=${{ secrets.BINANCE_API_SECRET }}
          BINANCE_API_KEY_TESTNET=${{ secrets.BINANCE_API_KEY_TESTNET }}
          BINANCE_API_SECRET_TESTNET=${{ secrets.BINANCE_API_SECRET_TESTNET }}
          WHALE_ALERT_API_KEY=${{ secrets.WHALE_ALERT_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_AUTHORIZED_USER_IDS=${{ secrets.TELEGRAM_AUTHORIZED_USER_IDS }}
          NEWSAPI_ORG_KEY=${{ secrets.NEWSAPI_ORG_KEY }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION=europe-west3
          VERTEX_AI_LOCATION=europe-west4
          ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET=${{ secrets.ALPACA_API_SECRET }}
          DATABASE_URL=
          DB_INSTANCE_CONNECTION_NAME=
          GCP_BILLING_ENABLED=true
          GCP_BILLING_ACCOUNT_ID=${{ secrets.GCP_BILLING_ACCOUNT_ID }}
          SERVICE_URL=${{ secrets.SERVICE_URL }}
          ENABLE_FILE_LOGGING=true
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write settings.yaml
        run: |
          cat > config/settings.yaml << 'SETTINGS_EOF'
          gcp_billing:
            enabled: true

          notification_services:
            telegram:
              enabled: true
            pushover:
              enabled: false

          settings:
            run_interval_minutes: 15

            sma_period: 20
            rsi_overbought_threshold: 70
            rsi_oversold_threshold: 30

            signal_mode: "sentiment"

            sentiment_signal:
              min_gemini_confidence: 0.5
              min_vader_score: 0.3
              rsi_buy_veto_threshold: 70
              rsi_sell_veto_threshold: 30
              adx_min_threshold: 20

            stoploss_cooldown_hours: 6
            signal_cooldown_hours: 4

            status_report_hours: 24

            paper_trading: false
            paper_trading_initial_capital: 10000.0

            simulated_fee_pct: 0.001
            simulated_slippage_pct: 0.001

            trade_risk_percentage: 0.03
            stop_loss_percentage: 0.035
            take_profit_percentage: 0.08
            max_concurrent_positions: 5

            trailing_stop_enabled: true
            trailing_stop_activation: 0.02
            trailing_stop_distance: 0.015

            regular_status_update:
              enabled: true
              interval_hours: 1

            news_analysis:
              enabled: true
              use_grounded_search: false
              web_scraping:
                enabled: true
              deep_scraping:
                enabled: true
              use_gemini_scoring: true
              cache_ttl_minutes: 30
              freshness_half_life_hours: 6
              volume_spike_multiplier: 3.0
              sentiment_shift_threshold: 0.3
              sentiment_buy_threshold: 0.15
              sentiment_sell_threshold: -0.15
              min_gemini_confidence: 0.5

            live_trading:
              enabled: true
              mode: "testnet"
              initial_capital: 100.0
              max_concurrent_positions: 2
              trade_risk_percentage: 0.05
              stop_loss_percentage: 0.03
              take_profit_percentage: 0.06
              daily_loss_limit_pct: 0.05
              max_drawdown_pct: 0.15
              balance_floor_usd: 70.0
              max_consecutive_losses: 3
              cooldown_hours: 24

            stock_trading:
              enabled: true
              broker: "paper_only"
              alpaca:
                paper: true
              paper_trading_initial_capital: 10000.0
              max_concurrent_positions: 8
              sma_period: 20
              rsi_period: 14
              rsi_overbought_threshold: 70
              rsi_oversold_threshold: 30
              pe_ratio_buy_threshold: 25
              pe_ratio_sell_threshold: 40
              earnings_growth_sell_threshold: -10
              volume_spike_multiplier: 1.5

            signal_confirmation:
              enabled: true
              timeout_minutes: 30
              require_confirmation_for:
                - "BUY"
                - "SELL"
                - "INCREASE"

            news_scraper_daemon:
              rss_interval_seconds: 300
              web_interval_seconds: 900
              deep_interval_seconds: 1800
              dedup_cache_hours: 48
              chrome_mcp:
                enabled: true
                timeout_seconds: 180
                fallback_to_bs4: true

            position_analyst:
              enabled: true
              min_position_age_hours: 2
              check_interval_minutes: 1440
              exit_confidence_threshold: 0.8
              increase_confidence_threshold: 0.75
              max_position_multiplier: 3.0

            strategic_categories:
              growth:
                label: "Growth (AI, Quantum, Biotech)"
                catastrophic_sl: 0.25
              sector_thesis:
                label: "Sector Rotation Bet"
                catastrophic_sl: 0.20
              value:
                label: "Undervalued Recovery Play"
                catastrophic_sl: 0.15
              macro_trend:
                label: "Macro Trend Following"
                catastrophic_sl: 0.20
              speculative:
                label: "Speculative Moonshot"
                catastrophic_sl: 0.30

            auto_trading:
              enabled: true
              paper_trading_initial_capital: 10000.0
              max_concurrent_positions: 20
              summary_interval_hours: 1

            ipo_tracking:
              enabled: true
              auto_add_to_watchlist: true
              detection_categories:
                - ipo
                - ai
                - press_release
              validate_ticker: true

            macro_regime:
              enabled: true
              risk_on_multiplier: 1.0
              caution_multiplier: 0.6
              risk_off_multiplier: 0.3
              suppress_buys_in_risk_off: true
              vix_elevated_threshold: 18
              vix_high_threshold: 25
              vix_extreme_threshold: 35
              weights:
                vix_signal: 2.0
                vix_trend: 1.0
                sp500_trend: 1.5
                yield_direction: 1.5
                btc_trend: 1.0
              risk_on_threshold: 3.0
              risk_off_threshold: -3.0

            sector_limits:
              enabled: true
              config_file: "config/sector_groups.yaml"
              telegram_alert_on_block: false

            event_calendar:
              enabled: true
              earnings:
                enabled: true
                block_hours_before: 24
                reduce_hours_before: 48
                reduce_multiplier: 0.5
              fomc:
                enabled: true
                block_hours_before: 24
                reduce_hours_before: 48
                reduce_multiplier: 0.5
              cpi:
                enabled: true
                block_hours_before: 0
                reduce_hours_before: 24
                reduce_multiplier: 0.5
              position_warnings:
                enabled: true
                lookahead_hours: 72

            market_alerts:
              enabled: true
              daily_digest_hour_utc: 8
              daily_digest_lookahead_hours: 72
              breaking_news:
                enabled: true
                min_confidence: 0.7
                catalyst_types: [regulatory, hack_exploit, macro, etf]
                cooldown_hours: 4
              sector_moves:
                enabled: true
                min_symbols_for_alert: 3
                min_avg_confidence: 0.5
                cooldown_hours: 6
              event_urgency:
                enabled: true
                urgency_hours_before: 24
                cooldown_hours: 12

            autonomous_bot:
              source_discovery:
                enabled: true
                discovery_interval_days: 7
                min_trial_days: 7
                min_trial_articles: 10
                promotion_threshold: 0.6
                demotion_threshold: 0.2
                max_experimental_sources: 10
              feedback_loop:
                enabled: true
                daily_review_hour_utc: 3
                min_trades_for_scoring: 5
                reliability_decay_days: 90
              auto_tuner:
                enabled: true
                tune_interval_days: 7
                min_sample_trades: 20
                min_sharpe_improvement: 0.1
                max_param_changes_per_cycle: 2
                auto_revert_days: 7
                auto_revert_degradation_pct: 0.10
                sl_min: 0.015
                sl_max: 0.06
                tp_min: 0.03
                tp_max: 0.15
                confidence_min: 0.35
                confidence_max: 0.75

            telegram_enhancements:
              morning_briefing:
                enabled: true
                hour_utc: 13
                include_ai_summary: false
              portfolio_digest:
                enabled: true
                interval_hours: 4
              realtime_alerts:
                enabled: true
                vix_spike_threshold: 3.0
                regime_change_alert: true
              ai_analysis:
                enabled: true
                cooldown_minutes: 15
              quick_actions:
                enabled: true
              ai_chat:
                enabled: true
                session_ttl_minutes: 30
                rate_limit_messages: 20
                rate_limit_window_seconds: 600
                max_history_turns: 20
                watchlist:
                  enabled: true
                  default_ttl_days: 30
                  max_items: 10

            live_dashboard:
              enabled: true
              daily_recap_hour_utc: 22

            position_monitor:
              enabled: true
              min_position_age_hours: 4
              exit_confidence_threshold: 0.8
              auto_exit: false
              check_interval_minutes: 60
          SETTINGS_EOF

      - name: Create deployment bundle
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -C "$GITHUB_WORKSPACE" .

      - name: Copy bundle to VM
        run: |
          gcloud compute scp /tmp/deploy.tar.gz \
            ${{ env.INSTANCE_NAME }}:/tmp/deploy.tar.gz \
            --zone=${{ env.ZONE }} --quiet

      - name: Deploy on VM
        run: |
          gcloud compute ssh ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.ZONE }} --quiet \
            --ssh-flag="-o ServerAliveInterval=30" \
            --ssh-flag="-o ServerAliveCountMax=20" \
            --command='
            set -e
            DEPLOY_DIR="$HOME/crypto-investment-bot"
            mkdir -p "$DEPLOY_DIR"
            tar xzf /tmp/deploy.tar.gz -C "$DEPLOY_DIR"
            rm /tmp/deploy.tar.gz

            # Ensure swap exists (e2-micro needs it to build TensorFlow)
            if [ "$(sudo swapon --show | wc -l)" -eq 0 ]; then
              sudo fallocate -l 2G /var/swapfile
              sudo chmod 600 /var/swapfile
              sudo mkswap /var/swapfile
              sudo swapon /var/swapfile
            fi

            # Stop and remove existing container
            sudo docker stop crypto-bot 2>/dev/null || true
            sudo docker rm crypto-bot 2>/dev/null || true

            # Build new image
            sudo docker build -t crypto-bot "$DEPLOY_DIR"

            # Ensure persistent data directory exists with correct ownership
            sudo mkdir -p /mnt/stateful_partition/data
            sudo chown -R 1000:1000 /mnt/stateful_partition/data

            # Run container
            sudo docker run -d \
              --name crypto-bot \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file "$DEPLOY_DIR/.env" \
              -e GOOGLE_GENAI_USE_VERTEXAI=true \
              -v /mnt/stateful_partition/data:/app/data \
              crypto-bot

            sudo docker ps --filter name=crypto-bot
          '

      - name: Ensure spot provisioning
        run: |
          SCHEDULING=$(gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.ZONE }} \
            --format='get(scheduling.provisioningModel)')
          echo "Current provisioning: $SCHEDULING"
          if [ "$SCHEDULING" != "SPOT" ]; then
            echo "Switching to SPOT provisioning..."
            gcloud compute instances stop ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }} --quiet
            gcloud compute instances set-scheduling ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }} \
              --provisioning-model=SPOT \
              --instance-termination-action=STOP \
              --no-restart-on-failure
            gcloud compute instances start ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }}
            echo "Switched to SPOT. Waiting 150s for full startup..."
            sleep 150
          else
            echo "Already SPOT. Waiting 120s for container startup..."
            sleep 120
          fi

      - name: Verify deployment
        run: |
          EXTERNAL_IP=$(gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM IP: $EXTERNAL_IP"
          curl -sf --max-time 15 "http://${EXTERNAL_IP}:8080/health" || echo "::warning::Health check failed — container may still be starting"
