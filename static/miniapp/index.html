<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portfolio</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="styles.css?v=15" />
</head>
<body>
  <div id="app">
    <header>
      <div id="portfolio-headline">
        <div class="label">Realized PnL</div>
        <div class="value" id="headline-realized">—</div>
      </div>
      <div id="regime-pill" class="pill pill-neutral">REGIME —</div>
    </header>

    <!-- Row 1: realized PnL split into non-overlapping bands that sum to the hero -->
    <div class="row-label">
      <span>Realized PnL by period</span>
      <span class="row-hint">sums to hero ↑</span>
    </div>
    <section id="period-bar" class="period-bar">
      <div class="period-cell">
        <div class="tile-label">Today</div>
        <div class="tile-value" id="tile-today-realized">—</div>
      </div>
      <div class="period-cell">
        <div class="tile-label">2–7d</div>
        <div class="tile-value" id="tile-2to7-realized">—</div>
      </div>
      <div class="period-cell">
        <div class="tile-label">8–30d</div>
        <div class="tile-value" id="tile-8to30-realized">—</div>
      </div>
      <div class="period-cell">
        <div class="tile-label">30d+</div>
        <div class="tile-value" id="tile-older-realized">—</div>
      </div>
    </section>

    <!-- Row 2: live portfolio state (independent snapshots, separate tiles) -->
    <div class="row-label">
      <span>Live portfolio</span>
      <span class="row-hint">right now</span>
    </div>
    <section id="live-tiles" class="live-tiles">
      <div class="tile">
        <div class="tile-label">Unrealized</div>
        <div class="tile-value" id="tile-unrealized">—</div>
      </div>
      <div class="tile">
        <div class="tile-label">Open</div>
        <div class="tile-value" id="tile-open">—</div>
      </div>
      <div class="tile">
        <div class="tile-label">Win rate 7d</div>
        <div class="tile-value" id="tile-winrate">—</div>
      </div>
      <div class="tile">
        <div class="tile-label">Biggest mover</div>
        <div class="tile-value" id="tile-biggest">—</div>
      </div>
    </section>

    <!-- Capital allocation: dry powder vs deployed across all strategies -->
    <div class="row-label">
      <span>Capital</span>
      <span class="row-hint" id="capital-util-hint">—</span>
    </div>
    <section id="capital-bar" class="capital-bar">
      <div class="capital-numbers">
        <span class="cap-item">
          <span class="cap-label">Total</span>
          <span class="cap-value" id="cap-total">—</span>
        </span>
        <span class="cap-sep">·</span>
        <span class="cap-item">
          <span class="cap-label">Locked</span>
          <span class="cap-value cap-locked" id="cap-locked">—</span>
        </span>
        <span class="cap-sep">·</span>
        <span class="cap-item">
          <span class="cap-label">Free</span>
          <span class="cap-value cap-free" id="cap-free">—</span>
        </span>
      </div>
      <div class="capital-meter">
        <div class="capital-meter-fill" id="cap-meter-fill" style="width: 0%"></div>
      </div>
    </section>

    <section id="equity-section">
      <div class="section-header">
        <span>Equity curve</span>
        <span class="range-toggle">
          <button class="range-btn" data-days="7">7d</button>
          <button class="range-btn active" data-days="30">30d</button>
          <button class="range-btn" data-days="90">90d</button>
        </span>
      </div>
      <div class="chart-wrap">
        <canvas id="equity-chart"></canvas>
      </div>
    </section>

    <section id="positions-section">
      <div class="section-header">
        <span id="positions-title">Open positions</span>
      </div>
      <div id="positions-groups"></div>
    </section>

    <section id="closed-section">
      <div class="section-header">
        <span id="closed-title">Recent closed trades</span>
        <span class="sort-toggle">
          <button class="closed-btn active" data-limit="10">10</button>
          <button class="closed-btn" data-limit="25">25</button>
        </span>
      </div>
      <div id="closed-list"></div>
    </section>

    <div id="toast" class="toast hidden"></div>

    <footer id="footer">
      <span id="as-of">—</span>
      <span class="sep">·</span>
      <span id="fx-note">FX: current snapshot</span>
    </footer>
  </div>

  <script src="app.js?v=15"></script>
</body>
</html>
